<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>子女端 - 老人状态</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; max-width: 720px; }
    .danger { color: #b00020; font-weight: 700; }
    .ok { color: #0a7a0a; font-weight: 700; }
    .muted { color: #666; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-top: 1px solid #eee; padding: 10px; text-align: left; }
    th { color: #333; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
    .badge-danger { background: #ffe6ea; color: #b00020; }
    .badge-ok { background: #e7f7e7; color: #0a7a0a; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 12px;">老人安全状态（今日）</h2>

    <div id="alerts"></div>

    <table>
      <thead>
        <tr>
          <th>老人</th>
          <th>状态</th>
          <th>打卡时间</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="muted" style="margin-top: 12px;">演示参数：在地址栏加 <code>?childId=2</code></div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const childId = Number(params.get('childId') || '2');

  const rowsEl = document.getElementById('rows');
  const alertsEl = document.getElementById('alerts');

  async function fetchJson(url) {
    const res = await fetch(url);
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) {
      const message = (data && data.message) ? data.message : (res.status + ' ' + res.statusText);
      throw new Error(message);
    }
    return data;
  }

  function renderAlerts(alerts) {
    if (!alerts || alerts.length === 0) {
      alertsEl.innerHTML = `<div class="ok">暂无未打卡预警</div>`;
      return;
    }

    const names = alerts.map(a => a.elderName).join('、');
    alertsEl.innerHTML = `<div class="danger">未打卡预警：${names}</div>`;
  }

  function renderRows(statuses) {
    rowsEl.innerHTML = '';
    for (const s of statuses) {
      const tr = document.createElement('tr');
      const statusText = s.missingCheckinAlert
        ? `<span class="badge badge-danger">未打卡（预警）</span>`
        : (s.checkedIn ? `<span class="badge badge-ok">已打卡</span>` : `<span class="badge badge-danger">未打卡</span>`);

      tr.innerHTML = `
        <td>${s.elderName}</td>
        <td>${statusText}</td>
        <td class="muted">${s.checkinTime || '-'}</td>
      `;
      rowsEl.appendChild(tr);
    }
  }

  async function refresh() {
    const [statuses, alerts] = await Promise.all([
      fetchJson(`/api/children/${childId}/elders/status/today`),
      fetchJson(`/api/children/${childId}/alerts/today`)
    ]);
    renderAlerts(alerts);
    renderRows(statuses);
  }

  (async () => {
    await refresh();
    setInterval(refresh, 30_000);
  })();
</script>
</body>
</html>
