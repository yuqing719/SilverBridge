<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>老人端 - 平安打卡</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; max-width: 560px; }
    .btn { width: 100%; font-size: 28px; padding: 16px; border-radius: 12px; border: 0; }
    .btn-ok { background: #111; color: #fff; }
    .btn-disabled { background: #999; color: #fff; }
    .row { margin-top: 12px; }
    .muted { color: #666; }
    .list { margin: 8px 0 0; padding: 0; list-style: none; }
    .list li { padding: 10px 0; border-top: 1px solid #eee; }
    .danger { color: #b00020; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 12px;">每日平安打卡</h2>

    <button id="checkinBtn" class="btn btn-ok">我平安</button>

    <div class="row" id="status"></div>

    <div class="row">
      <div class="muted">紧急联系人（一键拨号）</div>
      <ul class="list" id="contacts"></ul>
    </div>

    <div class="row muted">演示参数：在地址栏加 <code>?elderId=1</code></div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const elderId = Number(params.get('elderId') || '1');

  const checkinBtn = document.getElementById('checkinBtn');
  const statusEl = document.getElementById('status');
  const contactsEl = document.getElementById('contacts');

  async function fetchJson(url, options) {
    const res = await fetch(url, options);
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) {
      const message = (data && data.message) ? data.message : (res.status + ' ' + res.statusText);
      throw new Error(message);
    }
    return data;
  }

  function setButtonDisabled(disabled) {
    checkinBtn.disabled = disabled;
    checkinBtn.className = 'btn ' + (disabled ? 'btn-disabled' : 'btn-ok');
    checkinBtn.textContent = disabled ? '今日已打卡' : '我平安';
  }

  async function loadStatus() {
    const s = await fetchJson(`/api/elders/${elderId}/status/today`);
    if (s.missingCheckinAlert) {
      statusEl.innerHTML = `<div class="danger">今日未打卡（已触发预警）</div>`;
    } else if (s.checkedIn) {
      statusEl.innerHTML = `<div>今日状态：已打卡</div><div class="muted">打卡时间：${s.checkinTime}</div>`;
    } else {
      statusEl.innerHTML = `<div>今日状态：未打卡</div>`;
    }
    setButtonDisabled(!!s.checkedIn);
  }

  async function loadContacts() {
    const list = await fetchJson(`/api/elders/${elderId}/contacts`);
    contactsEl.innerHTML = '';
    for (const c of list) {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = `tel:${c.phone}`;
      a.textContent = `${c.name}：${c.phone}`;
      a.style.fontSize = '20px';
      li.appendChild(a);
      contactsEl.appendChild(li);
    }
  }

  checkinBtn.addEventListener('click', async () => {
    try {
      await fetchJson(`/api/elders/${elderId}/checkins/today`, { method: 'POST' });
      await loadStatus();
    } catch (e) {
      alert(e.message);
      await loadStatus();
    }
  });

  (async () => {
    await loadStatus();
    await loadContacts();
  })();
</script>
</body>
</html>
