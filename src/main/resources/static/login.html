<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 · 银龄桥</title>
  <link rel="stylesheet" href="/assets/app.css" />
  <style>
    .tab-bar{display:flex;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px;}
    .tab-bar button{flex:1;padding:10px 0;border:0;background:#fff;font-size:14px;cursor:pointer;}
    .tab-bar button.active{background:#111;color:#fff;}
    .form-group{margin-bottom:12px;}
    .form-group label{display:block;font-size:13px;color:#555;margin-bottom:4px;}
    .error-msg{color:var(--danger);font-size:12px;margin-top:8px;min-height:18px;}
    .logo{text-align:center;padding:32px 0 16px;}
    .logo .icon{font-size:40px;}
    .logo h2{margin:8px 0 4px;font-size:20px;}
    .logo p{color:var(--muted);font-size:13px;margin:0;}
    .role-select{display:flex;gap:8px;margin-top:4px;}
    .role-select label{flex:1;display:flex;align-items:center;gap:6px;
      border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:pointer;font-size:13px;}
    .role-select input[type=radio]{accent-color:#111;}
    .role-select label:has(input:checked){background:#111;color:#fff;border-color:#111;}
  </style>
</head>
<body>
  <div class="app">
    <div class="logo">
      <div class="icon">🌉</div>
      <h2>银龄桥</h2>
      <p>守护每一天的平安</p>
    </div>

    <div class="content" style="padding-top:0;">
      <div class="card">
        <div class="tab-bar" id="tabs">
          <button data-tab="login" class="active">登录</button>
          <button data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="panelLogin">
          <div class="form-group">
            <label>用户名</label>
            <input class="input" id="loginUsername" placeholder="请输入用户名" autocomplete="username" />
          </div>
          <div class="form-group">
            <label>密码</label>
            <input class="input" id="loginPassword" type="password" placeholder="请输入密码" autocomplete="current-password" />
          </div>
          <div class="error-msg" id="loginError"></div>
          <button class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:4px;">登录</button>
          <div class="muted row" style="text-align:center;">演示账号：elder1 / child1，密码均为 123456</div>
        </div>

        <!-- 注册表单 -->
        <div id="panelRegister" style="display:none;">
          <div class="form-group">
            <label>用户名</label>
            <input class="input" id="regUsername" placeholder="4-20 位字母或数字" autocomplete="username" />
          </div>
          <div class="form-group">
            <label>昵称</label>
            <input class="input" id="regName" placeholder="您的姓名或昵称" />
          </div>
          <div class="form-group">
            <label>密码（至少 6 位）</label>
            <input class="input" id="regPassword" type="password" placeholder="请设置密码" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label>身份</label>
            <div class="role-select">
              <label><input type="radio" name="regRole" value="ELDER" checked />👴 老人</label>
              <label><input type="radio" name="regRole" value="CHILD" />👦 子女</label>
            </div>
          </div>
          <div class="error-msg" id="regError"></div>
          <button class="btn btn-primary" id="registerBtn" style="width:100%;margin-top:4px;">注册并登录</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    // ── 标签切换 ─────────────────────────────────────────────────────
    qs('#tabs').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const tab = btn.dataset.tab;
      qsa('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      qs('#panelLogin').style.display   = tab === 'login'    ? '' : 'none';
      qs('#panelRegister').style.display = tab === 'register' ? '' : 'none';
    });

    // ── 登录 ─────────────────────────────────────────────────────────
    qs('#loginBtn').addEventListener('click', async () => {
      const username = qs('#loginUsername').value.trim();
      const password = qs('#loginPassword').value;
      qs('#loginError').textContent = '';
      if (!username || !password) { qs('#loginError').textContent = '请填写用户名和密码'; return; }
      try {
        await fetchJson('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, password })
        });
        redirectAfterLogin();
      } catch(e) {
        qs('#loginError').textContent = e.message || '登录失败';
      }
    });

    // ── 注册 ─────────────────────────────────────────────────────────
    qs('#registerBtn').addEventListener('click', async () => {
      const username = qs('#regUsername').value.trim();
      const name     = qs('#regName').value.trim();
      const password = qs('#regPassword').value;
      const role     = document.querySelector('input[name=regRole]:checked').value;
      qs('#regError').textContent = '';
      if (!username || !name || !password) { qs('#regError').textContent = '请填写所有字段'; return; }
      if (password.length < 6) { qs('#regError').textContent = '密码至少 6 位'; return; }
      try {
        await fetchJson('/api/auth/register', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, name, password, role })
        });
        redirectAfterLogin();
      } catch(e) {
        qs('#regError').textContent = e.message || '注册失败';
      }
    });

    // ── 回车快捷键 ───────────────────────────────────────────────────
    qs('#loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') qs('#loginBtn').click(); });
    qs('#regPassword').addEventListener('keydown',   e => { if(e.key==='Enter') qs('#registerBtn').click(); });

    function redirectAfterLogin() {
      const next = new URLSearchParams(location.search).get('next') || '/safety.html';
      location.href = next;
    }

    // ── 若已登录直接跳走 ─────────────────────────────────────────────
    (async () => {
      try {
        await fetchJson('/api/auth/me');
        redirectAfterLogin();
      } catch { /* 未登录，正常展示登录页 */ }
    })();
  </script>
</body>
</html>
